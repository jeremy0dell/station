bot_name: station-bot
unsafe_allow_unprotected_default_branch: true

setup:
  - uses: actions/setup-node@v4
    with:
      node-version: 24.x
  - name: Enable pnpm 11
    run: |
      corepack enable
      corepack prepare pnpm@11.0.0 --activate
  - name: Install
    run: pnpm install --frozen-lockfile
  - uses: oven-sh/setup-bun@v2
    with:
      bun-version: 1.3.14

workflows:
  ci-fix:
    watched_workflows: ["standard-ci"]

schema_version = 1

[observer]
auto_start = true
auto_start_from_hooks = true
idle_shutdown_minutes = 30
reconcile_interval_ms = 2000
socket_path = "~/.local/state/station/observer.sock"
state_dir = "~/.local/state/station"

[defaults]
worktree_provider = "worktrunk"
terminal = "tmux"
harness = "codex"
layout = "agent-build-shell"
default_branch = "main"
harness_permission_mode = "yolo"

[worktree.worktrunk]
command = "wt"
config_path = "~/.config/worktrunk/config.toml"
managed_root = "~/.worktrees"
base = "main"
include_main = false
include_external = false
use_lifecycle_hooks = true
hook_mode = "required-for-mvp"
breadcrumb_location = "external"

[terminal.tmux]
session_prefix = "station"
topology = "workbench"
workbench_session = "station"
window_naming = "project-branch"
primary_agent_pane = true
popup_width = "50%"
popup_height = "50%"
popup_position = "C"

[harness.claude]
enabled = true
command = "claude"
install_hooks = true
# permission_mode = "auto"  # Claude-only native mode; "auto" is rejected for other harnesses and as a global default

[harness.codex]
enabled = true
command = "codex"
sandbox_mode = "workspace-write"
approval_policy = "on-request"
install_hooks = true

[harness.opencode]
enabled = true
command = "opencode"
install_hooks = true

# Native Station workspace (TUI) behavior. Read only by the native Station UI;
# the observer and CLI ignore it.
[workspace]
scroll_on_output = "freeze" # freeze | shift | follow — scroll behavior while scrolled up
scrollback_lines = 10000    # normal-buffer history retained per native pane
welcome_on_boot = true      # show the welcome intro over the restored layout on cold boot
# Named pane automations in the pane context menu. Omit `automations` to keep the
# built-in "See diff (split right)"; set `automations = []` to turn it off.
# [[workspace.automations]]
# id = "triage"
# label = "Triage"
#   [[workspace.automations.steps]]
#   command = "git diff | diffnav"

[[hooks.event]]
id = "notify-agent-state"
events = ["worktree.agentStateChanged"]
command = "stn"
args = ["notify", "agent-state"]
timeout_ms = 3000

[[projects]]
id = "web"
label = "web"
aliases = ["frontend", "site", "www"]
root = "~/projects/web"
repo = "github.com/my-org/web"

[projects.commands]
dev = "pnpm dev"
test = "pnpm test"
lint = "pnpm lint"
typecheck = "pnpm typecheck"

[projects.display]
group = "work"
sort_order = 10

[projects.local_config]
enabled = true
path = ".station/config.toml"

[[projects]]
id = "api"
label = "api"
aliases = ["backend"]
root = "~/projects/api"
repo = "github.com/my-org/api"

[projects.defaults]
layout = "agent-shell"

[projects.commands]
dev = "cargo run"
test = "cargo test"
check = "cargo check"

[projects.display]
group = "work"
sort_order = 20

[[projects]]
id = "mobile"
label = "mobile"
aliases = ["app"]
root = "~/projects/mobile"
repo = "github.com/my-org/mobile"

[projects.defaults]
harness = "opencode"

[projects.commands]
dev = "pnpm start"
ios = "pnpm ios"
android = "pnpm android"
test = "pnpm test"

[projects.display]
group = "work"
sort_order = 30

[[projects]]
id = "station"
label = "station"
root = "~/projects/station"
repo = "github.com/me/station"

[projects.defaults]
layout = "agent-shell"

[projects.commands]
dev = "pnpm dev"
test = "pnpm test"
typecheck = "pnpm typecheck"

[projects.display]
group = "personal"
sort_order = 40

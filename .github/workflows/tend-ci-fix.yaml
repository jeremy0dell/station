name: tend-ci-fix
on:
  workflow_run:
    workflows: ["standard-ci"]
    types: [completed]
    branches: ["main"]

jobs:
  fix-ci:
    if: github.repository_owner == 'jeremy0dell' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.TEND_BOT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - run: "corepack enable\ncorepack prepare pnpm@11.0.0 --activate\n"
        name: Enable pnpm 11
      - run: pnpm install --frozen-lockfile
        name: Install
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: max-sixty/tend/claude@0.1.7
        with:
          github_token: ${{ secrets.TEND_BOT_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          bot_name: station-bot
          model: opus
          prompt: |
            /tend-ci-runner:ci-fix ${{ github.event.workflow_run.id }}
            - Run URL: ${{ github.event.workflow_run.html_url }}
            - Commit: ${{ github.event.workflow_run.head_sha }}
            - Commit message: ${{ github.event.workflow_run.head_commit.message }}

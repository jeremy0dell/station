name: tend-triage
on:
  issues:
    types: [opened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  triage:
    if: github.repository_owner == 'jeremy0dell' && contains(github.event.issue.labels.*.name, 'tend-outage') == false
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
      issues: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.TEND_BOT_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - run: "corepack enable\ncorepack prepare pnpm@11.0.0 --activate\n"
        name: Enable pnpm 11
      - run: pnpm install --frozen-lockfile
        name: Install
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: jeremy0dell/tend/claude@onboard
        with:
          github_token: ${{ secrets.TEND_BOT_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          bot_name: station-bot
          model: opus
          unsafe_allow_unprotected_default_branch: true
          prompt: |
            /tend-ci-runner:triage ${{ github.event.issue.number }}

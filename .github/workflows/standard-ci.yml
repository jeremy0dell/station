name: standard-ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: standard-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  standard-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Enable pnpm 11
        run: |
          corepack enable
          corepack prepare pnpm@11.0.0 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm test:unit
      - name: Contract tests
        run: pnpm test:contracts
      - name: Integration tests
        run: pnpm test:integration
      - name: Diagnostic tests
        run: pnpm test:diagnostics
      - name: Scripted-agent tests
        run: pnpm test:agent:scripted
      - name: Setup e2e tests
        run: pnpm test:e2e:setup

  # Station is the sole UI (Ink retired), so the Bun lane is mandatory: it
  # typechecks and tests the OpenTUI dashboard renderer and its view goldens.
  station-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Enable pnpm 11
        run: |
          corepack enable
          corepack prepare pnpm@11.0.0 --activate
      - name: Install (pnpm)
        run: pnpm install --frozen-lockfile
      # The link script symlinks built @station dist into the bun workspace.
      - name: Build @station packages
        run: pnpm build
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Test cross-runtime SQLite compatibility
        run: pnpm test:sqlite:bun
      - name: Install (bun)
        run: bun install
        working-directory: station
      - name: Typecheck station
        run: bun run typecheck
        working-directory: station
      - name: Test station
        run: bun run test
        working-directory: station

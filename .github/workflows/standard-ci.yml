name: standard-ci

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

concurrency:
  group: standard-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  standard-ci:
    # Reusable release calls retain the caller's tag context and must keep the full gate.
    if: >-
      github.ref_type == 'tag' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.x
      - name: Enable pnpm 11
        run: |
          corepack enable
          corepack prepare pnpm@11.0.0 --activate
      # Release acceptance stays cold so branch caches cannot enter candidate validation.
      - name: Restore Turbo cache
        if: github.event_name == 'pull_request'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ runner.arch }}-node24-pnpm11-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ runner.arch }}-node24-pnpm11-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Install (pnpm)
        run: pnpm install --frozen-lockfile
      - name: Install (bun)
        run: bun install --frozen-lockfile
        working-directory: station
      - name: Test
        run: pnpm test:pre-push

  main-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.x
      - name: Enable pnpm 11
        run: |
          corepack enable
          corepack prepare pnpm@11.0.0 --activate
      - name: Restore Turbo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ runner.arch }}-node24-pnpm11-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ runner.arch }}-node24-pnpm11-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}-
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Smoke
        run: |
          pnpm build
          pnpm typecheck
          pnpm lint
